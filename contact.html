<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Quote | KG Carpentry</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>

<body>

<div id="navbar"></div>

<div class="header-logo">
  <img src="images/logo-white.PNG" alt="KG Carpentry Logo">
</div>

<section class="content">

  <h1 class="page-title">Request a Quote</h1>

  <p class="services-p">
    Tell us about your project and we’ll get back to you quickly.
  </p>

  <form action="https://hooks.zapier.com/hooks/catch/27355263/uvo378l/" method="POST">

  <input type="text" name="Name" placeholder="Your Name" required>

  <input type="tel" name="Phone" placeholder="Your Phone Number" required>

  <select name="Service" required>
    <option value="">Select a Service</option>
    <option value="Framing">Framing</option>
    <option value="Decks">Decks</option>
    <option value="Additions">Additions</option>
    <option value="Trim Work">Trim Work</option>
    <option value="Renovations">Renovations</option>
    <option value="Repairs">Repairs</option>
  </select>

  <textarea name="Message" placeholder="Tell us about your project..." required></textarea>

  <button type="submit" class="cta-button">
    <span>Request a Quote</span>
  </button>

</form>

</section>

<div id="footer"></div>

<script src="js/loadComponents.js"></script>
<script src="js/main.js"></script>
<script>
document.getElementById("quote-form").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);

  fetch("https://hooks.zapier.com/hooks/catch/27355263/uvo378l/", {
    method: "POST",
    body: formData
  })
  .then(() => {
    alert("Request sent! We'll contact you shortly.");
    this.reset();
  })
  .catch(() => {
    alert("Something went wrong. Please try again.");
  });
});
</script>
</body>
</html>
