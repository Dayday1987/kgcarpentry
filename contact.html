<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Quote | KG Carpentry</title>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>

<body>

<div id="navbar"></div>

<div class="header-logo">
  <img src="images/logo-white.PNG" alt="KG Carpentry Logo">
</div>

<section class="content">

  <h1 class="page-title">Request a Quote</h1>

  <p class="services-p">
    Tell us about your project and we’ll get back to you quickly.
  </p>

  <form action="https://formspree.io/f/xaqavooe" method="POST" class="quote-form">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="tel" name="phone" placeholder="Your Phone Number" required>

    <select name="service">
      <option value="">Select Service</option>
      <option>Framing</option>
      <option>Decks</option>
      <option>Additions</option>
      <option>Trim Work</option>
      <option>Renovations</option>
      <option>Repairs</option>
    </select>

    <textarea name="message" placeholder="Tell us about your project..." required></textarea>

    <button type="submit" class="cta-button">
      <span>Request a Quote</span>
    </button>

  </form>

</section>

<div id="footer"></div>

<script src="js/loadComponents.js"></script>
<script src="js/main.js"></script>

</body>
</html>
